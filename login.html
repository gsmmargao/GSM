<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM Solution - Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f5f7; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        .logo-icon { background: black; color: white; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-right: 5px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: #4b5563; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: black; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error-msg { color: red; font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo"><span class="logo-icon">GSM</span> SOLUTION</div>
        <p style="color: #6b7280; font-size: 0.9rem; margin-bottom: 25px;">Authorized Personnel Only</p>
        
        <div class="input-group">
            <label>Email ID</label>
            <input type="email" id="email" placeholder="admin@gsmsolution.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        
        <button class="btn" onclick="login()">Log In</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const db = window.supabase.createClient(
            'https://cbsmsclmyyxgwwztqwsc.supabase.co', 
            'sb_publishable_wAIQBEnR8-o5R6Ic48efGQ_zomyZiJ-'
        );

        // Check if already logged in
        async function checkSession() {
            const { data } = await db.auth.getSession();
            if (data.session) {
                window.location.href = 'index.html'; // Redirect to app if already logged in
            }
        }
        checkSession();

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';
            document.querySelector('.btn').innerText = 'Verifying...';

            const { data, error } = await db.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
                document.querySelector('.btn').innerText = 'Log In';
            } else {
                window.location.href = 'index.html'; // Success! Send to dashboard
            }
        }
    </script>
</body>
</html>

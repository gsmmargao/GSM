<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM Solution - Cashbook</title>
    <style>
        /* ... Keep your existing CSS ... */
        
        /* Updated Scrolling Container to show exactly 10 entries */
        .ledger-wrapper {
            max-height: 450px; /* Approx height of 10 rows + header */
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--border-color);
        }
        thead th { position: sticky; top: 0; z-index: 10; background: #f9fafb; }
        tfoot td { position: sticky; bottom: 0; background: #f9fafb; z-index: 10; font-weight: bold; }
    </style>
</head>
<body>
    <!-- ... (Keep your existing HTML structure until the script) ... -->

<script>
    // --- Updated Fetch Logic with safety checks ---
    window.fetchCashbook = async function(forceRefresh = false) {
        try {
            if (forceRefresh || allEntries.length === 0) {
                const { data, error } = await db.from('cashbook_entries').select('*').order('created_at', { ascending: true });
                if (error) throw error;
                allEntries = data || [];
            }

            // --- SAFETY CHECK: Verify elements exist before updating ---
            const updateElement = (id, value) => {
                const el = document.getElementById(id);
                if (el) el.innerText = value;
            };

            // ... (Your processing logic remains the same) ...

            // --- Replace your DOM updates with this safe format ---
            updateElement('dailyCashIn', formatCurr(periodIn));
            updateElement('cashInCount', `${periodInCount} transactions`);
            updateElement('dailyCashOut', formatCurr(periodOut));
            updateElement('cashOutCount', `${periodOutCount} transactions`);
            updateElement('dailyClosing', formatCurr(runningBalance));
            
            const sub = document.getElementById('ledgerSubtitle');
            if(sub) sub.innerText = subtitleText;

            // ... (rest of your DOM updates) ...

        } catch(e) { console.error("Error in fetchCashbook: ", e); }
    }
</script>
</body>
</html>

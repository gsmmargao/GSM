<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSM Solution - Billing</title>
    <link rel="icon" href="data:,">
    <style>
        :root { --bg-color: #f4f5f7; --border-color: #e5e7eb; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-color); display: flex; height: 100vh; overflow: hidden; position: relative; }
        
        /* Auto-Collapsing Sidebar CSS */
        .sidebar { width: 250px; background: white; border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; transition: width 0.4s ease, padding 0.4s ease; overflow: hidden; white-space: nowrap; z-index: 40; }
        .sidebar.collapsed { width: 0; padding-left: 0; padding-right: 0; border-right: none; }
        
        .logo-area { display: flex; align-items: center; padding: 0 20px 20px 20px; font-weight: bold; font-size: 1.2rem; }
        .logo-icon { background: black; color: white; padding: 5px 10px; border-radius: 4px; margin-right: 10px; font-size: 0.9rem; }
        .nav-item { padding: 12px 20px; color: #4b5563; text-decoration: none; display: flex; align-items: center; font-size: 0.95rem; cursor: pointer; }
        .nav-item.active { background: black !important; color: white !important; border-radius: 0 20px 20px 0; margin-right: 20px; }
        .nav-item:hover:not(.active) { background: #f3f4f6; }

        /* Sidebar Toggle Button */
        .sidebar-toggle-btn { position: absolute; left: 250px; top: 50%; transform: translateY(-50%); background: black; color: white; width: 20px; height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 50; border-radius: 0 8px 8px 0; box-shadow: 2px 0 5px rgba(0,0,0,0.2); transition: left 0.4s ease; font-weight: bold; }
        .sidebar-collapsed-btn { left: 0 !important; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: var(--bg-color); z-index: 10;}
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--border-color); background: white; }
        .btn-primary { background: black; color: white; border: none; }
        .dashboard-padding { padding: 20px 30px; }

        .form-card { background: white; border-radius: 8px; border: 1px solid var(--border-color); padding: 25px; margin-bottom: 25px; display: none; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; color: #374151; margin-bottom: 5px; font-weight: 600;}
        .form-group label span { color: red; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.9rem; }

        .table-card { background: white; border-radius: 8px; border: 1px solid var(--border-color); padding: 0; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; background: #f9fafb; font-size: 0.85rem; color: #4b5563; border-bottom: 1px solid var(--border-color); }
        td { padding: 15px; font-size: 0.9rem; border-bottom: 1px solid var(--border-color); color: #111827; }
        .pagination { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: white; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <!-- Sidebar -->
<div class="sidebar" id="sidebar" onmouseenter="clearSidebarTimer()" onmouseleave="resetSidebarTimer()">
    <div class="logo-area"><div class="logo-icon">GSM</div>SOLUTION</div>
    <a href="index.html" class="nav-item">📋 Order Details</a>
    <a href="estimate.html" class="nav-item">🧾 Estimate Letter</a>
    <a href="billing.html" class="nav-item active">💳 Billing</a>
    <a href="store-plus.html" class="nav-item">📦 Store Plus</a>
    <a href="accessories.html" class="nav-item">🛍️ Accessories</a>
    <a href="sales-report.html" class="nav-item">📊 Sales Report</a>
    <a href="upi-book.html" class="nav-item">📖 UPI Book</a>
    <a href="cashbook.html" class="nav-item">💵 Cashbook</a>
    
    <!-- Admin Only Links Hidden by Default -->
    <a href="expenses.html" class="nav-item" id="navExpenses" style="display: none;">💸 Expenses</a>
    <a href="profit.html" class="nav-item" id="navProfit" style="display: none;">📈 Profit Book</a>
    <a href="users.html" class="nav-item" id="adminUsersTab" style="display: none; color: #2563eb; font-weight:bold;">👥 Manage Users</a>

    <div style="flex-grow: 1;"></div> 
    
    <div class="nav-item" onclick="logOut()" style="color: black !important; font-weight: bold; cursor: pointer; border-top: 1px solid var(--border-color); padding-top: 15px; margin: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
        <span id="userNameDisplay">User</span> 
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </div>
</div>
    <div class="sidebar-toggle-btn" id="sidebarToggle" onclick="toggleSidebar()">⋮</div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div><h1 style="margin:0; font-size:1.5rem;">Billing & Invoices</h1></div>
            <div>
                <button class="btn" onclick="window.location.reload()">↻ Refresh</button>
                <button class="btn btn-primary" onclick="toggleForm()">+ New Invoice</button>
            </div>
        </div>

        <div class="dashboard-padding">
            <div class="form-card" id="billingForm">
                <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px;">📄 CREATE NEW BILL</div>
                <div class="form-grid">
                    <div class="form-group"><label>Invoice No. (Auto)</label><input type="text" id="b-invoice" readonly style="background:#f3f4f6; font-weight:bold;"></div>
                    <div class="form-group"><label>Date</label><input type="date" id="b-date"></div>
                    <div class="form-group"><label>Job Number <span>*</span></label><input type="text" id="b-jobNo" placeholder="e.g. 4438768800" onblur="fetchAdvancePaid()"></div>
                    
                    <div class="form-group"><label>Advance Paid (₹)</label><input type="number" id="b-advance" value="0"></div>
                    
                    <!-- Split Payment Fields -->
                    <div class="form-group"><label>Cash Paid (₹)</label><input type="number" id="b-cashAmount" value="0" placeholder="0"></div>
                    <div class="form-group"><label>UPI Paid (₹)</label><input type="number" id="b-upiAmount" value="0" placeholder="0"></div>
                    <div class="form-group"><label>Card Paid (₹)</label><input type="number" id="b-cardAmount" value="0" placeholder="0"></div>
                </div>
                <div style="margin-top:15px;">
                    <button class="btn btn-primary" style="background:#10b981;" onclick="saveBill()">💾 Save Bill</button>
                    <button class="btn" onclick="toggleForm()">Cancel</button>
                </div>
            </div>

            <div class="table-card">
                <table>
                    <thead>
                        <tr id="tableHeaderRow">
                            <th>Invoice No.</th><th>Created By</th><th>Date</th><th>Job Number</th><th>Advance Paid</th><th>Amount Paid</th><th>Mode</th>
                        </tr>
                    </thead>
                    <tbody id="billingTableBody"></tbody>
                </table>
                <div class="pagination">
                    <button class="btn" onclick="prevPage()">Previous</button>
                    <span id="pageInfo" style="font-size:0.9rem; font-weight:bold;">Page 1</span>
                    <button class="btn" onclick="nextPage()">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const db = window.supabase.createClient('https://cbsmsclmyyxgwwztqwsc.supabase.co', 'sb_publishable_wAIQBEnR8-o5R6Ic48efGQ_zomyZiJ-');
        
        let allBillingData = [];
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentUserEmail = ''; 
        const ADMIN_EMAIL = 'gsmmargao@gmail.com';
        let isAdmin = false; // Track admin status

        // Sidebar Auto-Collapse Logic
        let sidebarTimer;
        window.resetSidebarTimer = function() {
            clearTimeout(sidebarTimer);
            sidebarTimer = setTimeout(() => {
                document.getElementById('sidebar').classList.add('collapsed');
                document.getElementById('sidebarToggle').classList.add('sidebar-collapsed-btn');
            }, 5000);
        }
        window.clearSidebarTimer = function() { clearTimeout(sidebarTimer); }
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('sidebarToggle');
            sidebar.classList.toggle('collapsed');
            btn.classList.toggle('sidebar-collapsed-btn');
            if(!sidebar.classList.contains('collapsed')) resetSidebarTimer();
            else clearSidebarTimer();
        }

        async function checkAuth() {
            const { data } = await db.auth.getSession();
            if (!data.session) {
                window.location.href = 'login.html';
            } else {
                currentUserEmail = data.session.user.email;
                let displayEmail = currentUserEmail.split('@')[0];
                document.getElementById('userNameDisplay').innerText = displayEmail.charAt(0).toUpperCase() + displayEmail.slice(1);
                
                // Show admin tabs and enable features if email matches
                if (data.session.user.email.trim().toLowerCase() === ADMIN_EMAIL.trim().toLowerCase()) {
                    isAdmin = true;
                    document.getElementById('adminUsersTab').style.display = 'flex';
                    document.getElementById('navExpenses').style.display = 'flex';
                    document.getElementById('navProfit').style.display = 'flex';
                    
                    // Add Action Header for Delete button
                    document.getElementById('tableHeaderRow').innerHTML += '<th>Action</th>';
                }
            }
        }

        window.logOut = async function() {
            await db.auth.signOut();
            window.location.href = 'login.html';
        }

        document.addEventListener("DOMContentLoaded", async () => {
            await checkAuth(); // Wait for auth to set isAdmin flag
            resetSidebarTimer(); 
            document.getElementById('b-date').value = new Date().toISOString().split('T')[0];
            window.fetchBilling();
        });

        async function generateInvoiceNo() {
            try {
                const { data } = await db.from('billing').select('invoiceNo').order('created_at', { ascending: false }).limit(1);
                let nextNum = 1000; 
                if (data && data.length > 0 && data[0].invoiceNo) {
                    const lastNum = parseInt(String(data[0].invoiceNo).replace(/\D/g, ''));
                    if (!isNaN(lastNum)) {
                        nextNum = lastNum >= 1000 ? lastNum + 1 : 1000;
                    }
                }
                document.getElementById('b-invoice').value = nextNum;
            } catch (err) {
                document.getElementById('b-invoice').value = 1000;
            }
        }

        window.toggleForm = function() {
            const form = document.getElementById('billingForm');
            if (form.style.display === 'none' || form.style.display === '') {
                form.style.display = 'block';
                document.getElementById('b-invoice').value = 'Loading...';
                generateInvoiceNo(); 
            } else form.style.display = 'none';
        }

        window.fetchAdvancePaid = async function() {
            const jobNo = document.getElementById('b-jobNo').value.trim();
            if(!jobNo) return;
            const { data } = await db.from('repairOrders').select('advancePaid').ilike('jobNo', jobNo).single();
            if(data && data.advancePaid) document.getElementById('b-advance').value = data.advancePaid;
        }

        window.fetchBilling = async function() {
            const { data } = await db.from('billing').select('*').order('created_at', { ascending: false });
            if (data) { allBillingData = data; currentPage = 1; renderTable(); }
        }

        function renderTable() {
            const tbody = document.getElementById('billingTableBody');
            tbody.innerHTML = '';
            const start = (currentPage - 1) * rowsPerPage;
            const paginatedItems = allBillingData.slice(start, start + rowsPerPage);

            paginatedItems.forEach(bill => {
                let actionCol = isAdmin ? `<td><button class="btn" style="padding:4px 8px; font-size:0.8rem; color:white; background:#ef4444; border:none;" onclick="deleteBill('${bill.invoiceNo}')">🗑️ Delete</button></td>` : '';
                
                tbody.innerHTML += `<tr>
                    <td><strong>${bill.invoiceNo}</strong></td>
                    <td style="text-transform: capitalize;">${bill.createdBy || 'Administrator'}</td>
                    <td>${bill.date}</td>
                    <td style="color:#2563eb; font-weight:bold;">${bill.jobNo || '-'}</td>
                    <td>₹${bill.advancePaid || 0}</td>
                    <td style="color:#10b981; font-weight:bold;">₹${bill.amountPaid || 0}</td>
                    <td><span style="background:#f3f4f6; padding:4px 8px; border-radius:4px;">${bill.paymentMode || 'None'}</span></td>
                    ${actionCol}
                </tr>`;
            });
            document.getElementById('pageInfo').innerText = `Page ${currentPage} of ${Math.ceil(allBillingData.length / rowsPerPage) || 1}`;
        }

        window.prevPage = function() { if (currentPage > 1) { currentPage--; renderTable(); } }
        window.nextPage = function() { if (currentPage < Math.ceil(allBillingData.length / rowsPerPage)) { currentPage++; renderTable(); } }

        window.deleteBill = async function(invoiceNo) {
            if (!confirm(`Are you sure you want to delete Invoice ${invoiceNo}? This cannot be undone.`)) return;
            
            const { error } = await db.from('billing').delete().eq('invoiceNo', invoiceNo);
            if (error) {
                alert("Error deleting bill: " + error.message);
            } else {
                fetchBilling();
            }
        }

        window.saveBill = async function() {
            const rawJobNo = document.getElementById('b-jobNo').value.trim();
            
            if(!rawJobNo) {
                return alert("Please enter a valid Job Number.");
            }

            // Gather Payment Splits
            const cashAmount = parseFloat(document.getElementById('b-cashAmount').value) || 0;
            const upiAmount = parseFloat(document.getElementById('b-upiAmount').value) || 0;
            const cardAmount = parseFloat(document.getElementById('b-cardAmount').value) || 0;
            const totalAmountPaid = cashAmount + upiAmount + cardAmount;

            // Generate Mode Label Based on what fields have values
            let modes = [];
            if (cashAmount > 0) modes.push("Cash");
            if (upiAmount > 0) modes.push("UPI");
            if (cardAmount > 0) modes.push("Card");
            const finalPaymentMode = modes.length > 0 ? modes.join(' + ') : 'None';

            const billData = {
                invoiceNo: document.getElementById('b-invoice').value.toString(),
                date: document.getElementById('b-date').value,
                jobNo: rawJobNo,
                advancePaid: parseFloat(document.getElementById('b-advance').value) || 0,
                amountPaid: totalAmountPaid,
                paymentMode: finalPaymentMode,
                createdBy: document.getElementById('userNameDisplay').innerText 
            };

            const { error: billError } = await db.from('billing').insert([billData]);
            if (billError) return alert("Error saving Bill: " + billError.message);
            
            // Update Repair Orders Table
            let updateData = { status: 'Goods Delivered' };
            if (billData.advancePaid > 0) updateData.advancePaid = billData.advancePaid;
            await db.from('repairOrders').update(updateData).ilike('jobNo', rawJobNo);

            // INTEGRATION: Push individual amounts to relevant books
            if (cashAmount > 0) {
                await recordPaymentBook('cashbook_entries', billData.invoiceNo, billData.jobNo, cashAmount, 'Cash');
            }
            if (upiAmount > 0) {
                // IMPORTANT: Ensure your UPI table is named 'upi_entries'. If it's different, change it here!
                await recordPaymentBook('upi_entries', billData.invoiceNo, billData.jobNo, upiAmount, 'UPI');
            }
            
            alert("Bill Generated Successfully!");
            window.toggleForm();
            window.fetchBilling();
            
            // Reset Form Fields
            document.getElementById('b-jobNo').value = '';
            document.getElementById('b-advance').value = '0';
            document.getElementById('b-cashAmount').value = '0';
            document.getElementById('b-upiAmount').value = '0';
            document.getElementById('b-cardAmount').value = '0';
        }

        // Generic function to post to either Cashbook or UPI Book
        window.recordPaymentBook = async function(tableName, invoiceNo, jobNo, paidAmount, modeName) {
            if (!paidAmount || paidAmount <= 0) return;

            const entry = {
                description: `Invoice #${invoiceNo} - Job ${jobNo || 'N/A'} (${modeName})`,
                category: 'Billing',
                amount: paidAmount,
                type: 'in',
                created_by: currentUserEmail
            };

            try {
                const { error } = await db.from(tableName).insert([entry]);
                if (error) throw error;
                console.log(`${modeName} payment recorded in ${tableName} successfully.`);
            } catch (error) {
                console.error(`Failed to log ${modeName} payment to ${tableName}:`, error.message);
            }
        };

    </script>
</body>
</html>

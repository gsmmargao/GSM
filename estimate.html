<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM Solution - Estimate Builder</title>
    <style>
        :root { --bg-color: #f4f5f7; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-color); display: flex; height: 100vh; }
        .sidebar { width: 250px; background: white; border-right: 1px solid #ccc; padding: 20px; }
        .nav-item { display: block; padding: 10px; color: #333; text-decoration: none; }
        .nav-item.active { background: black; color: white; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .form-container { background: white; padding: 20px; border-radius: 8px; display: none; }
        .btn { padding: 10px 20px; cursor: pointer; background: black; color: white; border: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <strong>GSM SOLUTION</strong>
        <a href="index.html" class="nav-item">Order Details</a>
        <a href="estimate.html" class="nav-item active">Estimate Letter</a>
    </div>

    <div class="main-content">
        <div id="listView">
            <button class="btn" onclick="showForm()">+ Create New Estimate</button>
            <table><thead><tr><th>Est No.</th><th>Customer</th><th>Amount</th></tr></thead><tbody id="estimatesTableBody"></tbody></table>
        </div>

        <div id="formView" class="form-container">
            <h3>New Estimate</h3>
            <input type="text" id="estNo" readonly placeholder="Est No">
            <input type="text" id="customerName" placeholder="Customer Name">
            <input type="number" id="labour" placeholder="Labour" oninput="calculate()">
            <input type="number" id="parts" placeholder="Parts" oninput="calculate()">
            <p>Total (Tax 18%): ₹<span id="totalDisplay">0</span></p>
            <button class="btn" onclick="saveEstimate()">Save & Print</button>
            <button class="btn" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://cbsmsclmyyxgwwztqwsc.supabase.co', 
            'sb_publishable_wAIQBEnR8-o5R6Ic48efGQ_zomyZiJ-'
        );

        async function fetchEstimates() {
            const { data } = await supabase.from('estimates').select('*');
            const tbody = document.getElementById('estimatesTableBody');
            tbody.innerHTML = '';
            if(data) data.forEach(est => {
                tbody.innerHTML += `<tr><td>${est.estNo}</td><td>${est.customerName}</td><td>₹${est.billAmount}</td></tr>`;
            });
        }

        function calculate() {
            const l = parseFloat(document.getElementById('labour').value) || 0;
            const p = parseFloat(document.getElementById('parts').value) || 0;
            document.getElementById('totalDisplay').innerText = ((l + p) * 1.18).toFixed(2);
        }

        async function saveEstimate() {
            const estData = {
                estNo: document.getElementById('estNo').value,
                customerName: document.getElementById('customerName').value,
                billAmount: parseFloat(document.getElementById('totalDisplay').innerText)
            };
            await supabase.from('estimates').insert([estData]);
            alert("Saved!");
            window.print();
            location.reload();
        }

        function showForm() {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('formView').style.display = 'block';
            document.getElementById('estNo').value = 'EST' + Date.now().toString().slice(-3);
        }

        fetchEstimates();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM Solution - Estimate</title>
</head>
<body>
    <h3>Estimate Builder</h3>
    <button onclick="testConnection()">Click to Test Connection</button>
    <div id="status" style="margin-top: 10px; font-family: monospace;"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = window.supabase.createClient(
            'https://cbsmsclmyyxgwwztqwsc.supabase.co', 
            'sb_publishable_wAIQBEnR8-o5R6Ic48efGQ_zomyZiJ-'
        );

        async function testConnection() {
            document.getElementById('status').innerText = "Connecting...";
            try {
                // Using a direct fetch to the table
                const { data, error } = await supabaseClient
                    .from('estimates')
                    .select('*');
                
                if (error) {
                    // This will tell us if it's a 401 or a different Postgres error
                    throw new Error(JSON.stringify(error));
                }
                
                document.getElementById('status').innerText = "SUCCESS! Fetched " + data.length + " rows.";
            } catch (e) {
                document.getElementById('status').innerText = "ERROR: " + e.message;
                console.error("Full Error Object:", e);
            }
        }
    </script>
</body>
</html>

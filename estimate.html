<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GSM SOLUTION - Estimate Builder</title>
    <style>
        body { font-family: sans-serif; background: #f4f5f7; margin: 0; display: flex; }
        .sidebar { width: 250px; background: white; border-right: 1px solid #ccc; height: 100vh; padding: 20px; }
        .nav-item { display: block; padding: 10px; color: #333; text-decoration: none; }
        .nav-item.active { background: black; color: white; }
        .main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .form-card { background: white; padding: 20px; border-radius: 8px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; }
        .btn { padding: 10px; cursor: pointer; background: black; color: white; border: none; }
        @media print { .no-print { display: none !important; } .form-card { display: block !important; } }
    </style>
</head>
<body>
    <div class="sidebar no-print">
        <strong>GSM SOLUTION</strong>
        <a href="index.html" class="nav-item">Order Details</a>
        <a href="estimate.html" class="nav-item active">Estimate Letter</a>
    </div>

    <div class="main-content">
        <div id="listView" class="no-print">
            <button class="btn" onclick="openForm()">+ Create New Estimate</button>
            <table id="estTable"><thead><tr><th>Est No</th><th>Customer</th><th>Amount</th></tr></thead><tbody id="estimatesTableBody"></tbody></table>
        </div>

        <div id="formView" class="form-card">
            <h3>GSM SOLUTION - Estimate Letter</h3>
            <input type="text" id="estNo" readonly>
            <input type="text" id="customerName" placeholder="Customer Name">
            <input type="number" id="labour" placeholder="Labour Charge" oninput="runCalc()">
            <input type="number" id="parts" placeholder="Parts Amount" oninput="runCalc()">
            <p><strong>Final Bill (incl 18% Tax): ₹<span id="totalDisplay">0</span></strong></p>
            <button class="btn" onclick="saveAndPrint()">Save & Print</button>
            <button class="btn" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Using a completely different variable name to avoid "already declared" errors
        const db = window.supabase.createClient(
            'https://cbsmsclmyyxgwwztqwsc.supabase.co', 
            'sb_publishable_wAIQBEnR8-o5R6Ic48efGQ_zomyZiJ-'
        );

        async function loadData() {
            const { data } = await db.from('estimates').select('*');
            const tbody = document.getElementById('estimatesTableBody');
            tbody.innerHTML = '';
            if(data) data.forEach(e => tbody.innerHTML += `<tr><td>${e.estNo}</td><td>${e.customerName}</td><td>₹${e.billAmount}</td></tr>`);
        }

        function runCalc() {
            const l = parseFloat(document.getElementById('labour').value) || 0;
            const p = parseFloat(document.getElementById('parts').value) || 0;
            document.getElementById('totalDisplay').innerText = ((l + p) * 1.18).toFixed(2);
        }

        async function saveAndPrint() {
            const data = { 
                estNo: document.getElementById('estNo').value, 
                customerName: document.getElementById('customerName').value, 
                billAmount: parseFloat(document.getElementById('totalDisplay').innerText) 
            };
            await db.from('estimates').insert([data]);
            window.print();
            location.reload();
        }

        function openForm() {
            document.getElementById('listView').style.display = 'none';
            document.getElementById('formView').style.display = 'block';
            document.getElementById('estNo').value = 'EST' + Date.now().toString().slice(-3);
        }

        loadData();
    </script>
</body>
</html>
